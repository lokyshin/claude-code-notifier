<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" fill="none">
  <!-- Soft warm background with subtle radial gradient -->
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FBF5EF"/>
      <stop offset="100%" stop-color="#EDE0D6"/>
    </radialGradient>
  </defs>
  <rect width="160" height="160" rx="32" fill="url(#bg)"/>

  <!-- 8 teardrop petals -->
  <path d="M 80.00,90.00 C 63.00,75.00 74.90,37.50 80.00,30.00 C 85.10,37.50 97.00,75.00 80.00,90.00 Z" fill="#C9623F" opacity="0.92"/>
  <path d="M 72.93,87.07 C 71.51,64.44 106.45,46.34 115.36,44.64 C 113.66,53.55 95.56,88.49 72.93,87.07 Z" fill="#C9623F" opacity="0.92"/>
  <path d="M 70.00,80.00 C 85.00,63.00 122.50,74.90 130.00,80.00 C 122.50,85.10 85.00,97.00 70.00,80.00 Z" fill="#C9623F" opacity="0.92"/>
  <path d="M 72.93,72.93 C 95.56,71.51 113.66,106.45 115.36,115.36 C 106.45,113.66 71.51,95.56 72.93,72.93 Z" fill="#C9623F" opacity="0.92"/>
  <path d="M 80.00,70.00 C 97.00,85.00 85.10,122.50 80.00,130.00 C 74.90,122.50 63.00,85.00 80.00,70.00 Z" fill="#C9623F" opacity="0.92"/>
  <path d="M 87.07,72.93 C 88.49,95.56 53.55,113.66 44.64,115.36 C 46.34,106.45 64.44,71.51 87.07,72.93 Z" fill="#C9623F" opacity="0.92"/>
  <path d="M 90.00,80.00 C 75.00,97.00 37.50,85.10 30.00,80.00 C 37.50,74.90 75.00,63.00 90.00,80.00 Z" fill="#C9623F" opacity="0.92"/>
  <path d="M 87.07,87.07 C 64.44,88.49 46.34,53.55 44.64,44.64 C 53.55,46.34 88.49,64.44 87.07,87.07 Z" fill="#C9623F" opacity="0.92"/>

  <!-- Small white center hole -->
  <circle cx="80" cy="80" r="7" fill="#EDE0D6" opacity="0.7"/>

  <!-- Keyboard badge - bottom right -->
  <circle cx="124" cy="124" r="24" fill="#3D3D4E"/>
  <!-- Keyboard outline -->
  <rect x="108" y="116" width="32" height="18" rx="3" fill="none" stroke="white" stroke-width="1.8"/>
  <!-- Row 1: 4 keys -->
  <rect x="110.5" y="118.5" width="5" height="3.5" rx="0.8" fill="white"/>
  <rect x="117.5" y="118.5" width="5" height="3.5" rx="0.8" fill="white"/>
  <rect x="124.5" y="118.5" width="5" height="3.5" rx="0.8" fill="white"/>
  <rect x="131.5" y="118.5" width="5" height="3.5" rx="0.8" fill="white"/>
  <!-- Row 2: 3 keys -->
  <rect x="111"   y="124"   width="5" height="3.5" rx="0.8" fill="white"/>
  <rect x="118.5" y="124"   width="5" height="3.5" rx="0.8" fill="white"/>
  <rect x="126"   y="124"   width="5" height="3.5" rx="0.8" fill="white"/>
  <!-- Spacebar -->
  <rect x="111"   y="129.5" width="26" height="3" rx="1.2" fill="white"/>
